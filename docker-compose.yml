version: '3.8'
name: ${COMPOSE_PROJECT_NAME_TEST:-prp_test}

services:
  prp-postgres-test:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    volumes:
      - ./data/test/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB_TEST:-prp_financeiro}
      - POSTGRES_USER=${POSTGRES_USER_TEST:-prp_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_TEST:-zH23LJGicTj9SR}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER_TEST:-prp_user} -d ${POSTGRES_DB_TEST:-prp_financeiro}" ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always

  prp-financeiro-test:
    build: .
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--timeout", "120", "--graceful-timeout", "120", "--keep-alive", "5", "--access-logfile", "-", "--error-logfile", "-", "run:app"]
    ports:
      - "5002:5000"
    volumes:
      - ./data:/app/data
      - ./instance:/app/instance
    restart: always
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-prod_key_change_me}
      - DATABASE_URL=${DATABASE_URL_TEST:-postgresql://prp_user:zH23LJGicTj9SR@prp-postgres-test:5432/prp_financeiro}
    depends_on:
      prp-postgres-test:
        condition: service_healthy

  prp-updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    ports:
      - "5005:5005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    environment:
      - UPDATE_TOKEN=${UPDATE_TOKEN:-prp_secure_token_2026}
      - DATABASE_URL=${DATABASE_URL_TEST:-postgresql://prp_user:zH23LJGicTj9SR@prp-postgres-test:5432/prp_financeiro}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME_TEST:-prp_test}
      - COMPOSE_FILE=docker-compose.yml
      - PROJECT_DIR=/app
      - SERVICE_NAME=prp-financeiro-test
      - ENVIRONMENT=dev
    restart: always
