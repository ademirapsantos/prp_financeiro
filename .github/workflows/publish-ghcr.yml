name: Build and Push (GHCR)

on:
  push:
    branches:
      - release
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "TAG_ENV=prod" >> $GITHUB_ENV
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          else
            echo "TAG_ENV=hml" >> $GITHUB_ENV
            echo "ENV_NAME=hml" >> $GITHUB_ENV
          fi

      - name: Read Version
        id: version
        run: |
          VERSION=$(grep "__version__ =" app/version.py | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
          # context . 
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.TAG_ENV }}-latest
            ghcr.io/${{ github.repository }}:${{ env.TAG_ENV }}-v${{ steps.version.outputs.VERSION }}

      - name: Build and push image
          # context . 
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.TAG_ENV }}-latest
            ghcr.io/${{ github.repository }}:${{ env.TAG_ENV }}-v${{ steps.version.outputs.VERSION }}
