version: '3.8'

services:
  prp-financeiro-prod:
    image: ${PRP_IMAGE_PROD:-ghcr.io/ademirapsantos/prp_financeiro:prod-latest}
    container_name: prp-financeiro-prod
    ports:
      - "5000:5000"
    volumes:
      - /srv/prp_financeiro/data:/app/data
      - ./manifests:/app/manifests:ro
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=prod_key_change_me
      - DATABASE_PATH=/app/data/prp_financeiro.db
      - MAINTENANCE_MODE=false
      - UPDATE_TOKEN=${UPDATE_TOKEN}
      - ENVIRONMENT=prod
      - MANIFEST_BASE_URL=https://ademirapsantos.github.io/prp_financeiro
      - UPDATER_BASE_URL=http://prp-updater-prod:5005
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: always

  prp-updater-prod:
    build:
      context: .
      dockerfile: Dockerfile.updater
    container_name: prp-updater-prod
    ports:
      - "5025:5005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
      - /srv/prp_financeiro/data:/app/data
    networks:
      default:
        aliases:
          - prp-updater
    environment:
      - UPDATE_TOKEN=${UPDATE_TOKEN}
      - COMPOSE_FILE=docker-compose.prod.yml
      - SERVICE_NAME=prp-financeiro-prod
      - COMPOSE_PROJECT_NAME=prp_financeiro
      - ENVIRONMENT=prod
      - MANIFEST_BASE_URL=https://ademirapsantos.github.io/prp_financeiro
      - GHCR_IMAGE=ghcr.io/ademirapsantos/prp_financeiro
      - PROJECT_DIR=/app
    restart: always
