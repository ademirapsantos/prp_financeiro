version: '3.8'
name: ${COMPOSE_PROJECT_NAME_PROD:-prp}

services:
  prp-postgres-prod:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - ${PRP_ROOT_DIR:-./runtime}/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB_PROD}
      - POSTGRES_USER=${POSTGRES_USER_PROD}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_PROD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER_PROD} -d ${POSTGRES_DB_PROD}" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - prp_net

  prp-financeiro-prod:
    image: ${PRP_IMAGE_PROD}
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--timeout", "120", "--graceful-timeout", "120", "--keep-alive", "5", "--access-logfile", "-", "--error-logfile", "-", "run:app"]
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:5000:5000"
    volumes:
      - ${PRP_ROOT_DIR:-./runtime}/data:/app/data
      - ${PRP_ROOT_DIR:-./runtime}/manifests:/app/manifests:ro
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL_PROD}
      - PG_BIN_DIR=${PG_BIN_DIR:-}
      - PG_DUMP_BIN=${PG_DUMP_BIN:-}
      - PG_RESTORE_BIN=${PG_RESTORE_BIN:-}
      - MAINTENANCE_MODE=false
      - UPDATE_TOKEN=${UPDATE_TOKEN}
      - ENVIRONMENT=prod
      - MANIFEST_BASE_URL=https://ademirapsantos.github.io/prp_financeiro
      - UPDATER_BASE_URL=http://prp-updater-prod:5005
    depends_on:
      prp-postgres-prod:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - prp_net

  prp-updater-prod:
    image: ${UPDATER_IMAGE_PROD}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:5025:5005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PRP_ROOT_DIR:-./runtime}:/srv/prp
      - ${PRP_ROOT_DIR:-./runtime}/data:/srv/prp/data
    environment:
      - UPDATE_TOKEN=${UPDATE_TOKEN}
      - COMPOSE_FILE=docker-compose.prod.yml
      - SERVICE_NAME=prp-financeiro-prod
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME_PROD:-prp}
      - ENVIRONMENT=prod
      - MANIFEST_BASE_URL=https://ademirapsantos.github.io/prp_financeiro
      - GHCR_IMAGE=ghcr.io/ademirapsantos/prp_financeiro
      - PROJECT_DIR=/srv/prp
      - PRP_IMAGE_PROD=${PRP_IMAGE_PROD}
      - UPDATER_IMAGE_PROD=${UPDATER_IMAGE_PROD}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL_PROD=${DATABASE_URL_PROD}
      - DATABASE_URL=${DATABASE_URL_PROD}
      - APP_HOST=prp-financeiro-prod
      - APP_PORT=5000
      - REQUIRES_DB_MIGRATION=${REQUIRES_DB_MIGRATION:-false}
      - DB_MIGRATION_CMD=${DB_MIGRATION_CMD:-}
      - DB_MIGRATION_TIMEOUT_SECONDS=${DB_MIGRATION_TIMEOUT_SECONDS:-300}
    networks:
      prp_net:
        aliases:
          - prp-updater
    restart: unless-stopped

networks:
  prp_net:
    name: prp_net
    driver: bridge
