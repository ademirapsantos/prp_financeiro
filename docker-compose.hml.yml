version: '3.8'

services:
  prp-financeiro-hml:
    image: ${PRP_IMAGE_HML:-ghcr.io/ademirapsantos/prp_financeiro:hml-latest}
    container_name: prp-financeiro-hml
    ports:
      - "5001:5000"
    volumes:
      - ./data/hml:/app/data
      - ./instance:/app/instance
      - ./manifests:/app/manifests:ro
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=prod_key_change_me
      - DATABASE_PATH=/app/data/prp_financeiro.db
      - MAINTENANCE_MODE=false
      - UPDATE_TOKEN=${UPDATE_TOKEN:-prp_secure_token_2026}
      - ENVIRONMENT=hml
      - MANIFEST_BASE_URL=https://ademirapsantos.github.io/prp_financeiro
      - UPDATER_BASE_URL=http://prp-updater-hml:5005
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: always

  prp-updater-hml:
    build:
      context: .
      dockerfile: Dockerfile.updater
    container_name: prp-updater-hml
    ports:
      - "5015:5005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    networks:
      default:
        aliases:
          - prp-updater
    environment:
      - UPDATE_TOKEN=${UPDATE_TOKEN:-prp_secure_token_2026}
      - COMPOSE_FILE=docker-compose.hml.yml
      - SERVICE_NAME=prp-financeiro-hml
      - COMPOSE_PROJECT_NAME=prp_financeiro
      - ENVIRONMENT=hml
      - MANIFEST_BASE_URL=https://ademirapsantos.github.io/prp_financeiro
      - GHCR_IMAGE=ghcr.io/ademirapsantos/prp_financeiro
      - PROJECT_DIR=/app
    restart: always
