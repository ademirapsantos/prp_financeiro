version: '3.8'
name: ${COMPOSE_PROJECT_NAME_HML:-prp_hml}

services:
  prp-postgres-hml:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    volumes:
      - ./data/hml/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB_HML:-prp_financeiro}
      - POSTGRES_USER=${POSTGRES_USER_HML:-prp_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_HML:-zH23LJGicTj9SR}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER_HML:-prp_user} -d ${POSTGRES_DB_HML:-prp_financeiro}" ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always

  prp-financeiro-hml:
    image: ${PRP_IMAGE_HML:-ghcr.io/ademirapsantos/prp_financeiro:hml-latest}
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--timeout", "120", "--graceful-timeout", "120", "--keep-alive", "5", "--access-logfile", "-", "--error-logfile", "-", "run:app"]
    ports:
      - "5001:5000"
    volumes:
      - ./data/hml:/app/data
      - ./manifests:/app/manifests:ro
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-prod_key_change_me}
      - DATABASE_URL=${DATABASE_URL_HML:-postgresql://prp_user:zH23LJGicTj9SR@prp-postgres-hml:5432/prp_financeiro}
      - PG_BIN_DIR=${PG_BIN_DIR:-}
      - PG_DUMP_BIN=${PG_DUMP_BIN:-}
      - PG_RESTORE_BIN=${PG_RESTORE_BIN:-}
      - UPDATE_TOKEN=${UPDATE_TOKEN:-prp_secure_token_2026}
      - ENVIRONMENT=hml
      - MANIFEST_BASE_URL=https://ademirapsantos.github.io/prp_financeiro
      - UPDATER_BASE_URL=http://prp-updater-hml:5005
    depends_on:
      prp-postgres-hml:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: always

  prp-updater-hml:
    build:
      context: .
      dockerfile: Dockerfile.updater
    ports:
      - "5015:5005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
      - ./data/hml:/app/data
    networks:
      default:
        aliases:
          - prp-updater
    environment:
      - UPDATE_TOKEN=${UPDATE_TOKEN:-prp_secure_token_2026}
      - COMPOSE_FILE=docker-compose.hml.yml
      - SERVICE_NAME=prp-financeiro-hml
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME_HML:-prp_hml}
      - ENVIRONMENT=hml
      - MANIFEST_BASE_URL=https://ademirapsantos.github.io/prp_financeiro
      - GHCR_IMAGE=ghcr.io/ademirapsantos/prp_financeiro
      - PROJECT_DIR=/app
      - DATABASE_URL=${DATABASE_URL_HML:-postgresql://prp_user:zH23LJGicTj9SR@prp-postgres-hml:5432/prp_financeiro}
      - REQUIRES_DB_MIGRATION=${REQUIRES_DB_MIGRATION:-false}
      - DB_MIGRATION_CMD=${DB_MIGRATION_CMD:-}
      - DB_MIGRATION_TIMEOUT_SECONDS=${DB_MIGRATION_TIMEOUT_SECONDS:-300}
    restart: always

  prp-pgadmin-hml:
    image: dpage/pgadmin4:latest
    ports:
      - "${PGADMIN_BIND_IP_HML:-127.0.0.1}:${PGADMIN_PORT_HML:-5051}:80"
    volumes:
      - ./data/hml/pgadmin:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL_HML:-admin@prp.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD_HML:-troque_essa_senha}
      - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=True
      - PGADMIN_CONFIG_LOGIN_BANNER="PRP Financeiro - Homologacao"
    depends_on:
      prp-postgres-hml:
        condition: service_healthy
    restart: always
