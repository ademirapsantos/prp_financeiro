{% extends "base.html" %}

{% block content %}
<div class="header" style="margin-bottom: 2rem;">
    <h1>Venda de Ativo: {{ ativo.descricao }}</h1>
</div>

<div class="card" style="max-width: 720px;">
    <form method="POST">
        {% if next_url %}
        <input type="hidden" name="next_url" value="{{ next_url }}">
        {% endif %}

        <div style="display: grid; grid-template-columns: 1fr; gap: 1.25rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Comprador</label>
                <select name="comprador_id" required class="form-control">
                    {% for c in compradores %}
                    <option value="{{ c.id }}">{{ c.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Data da Venda</label>
                <input type="date" name="data_venda" value="{{ today }}" required class="form-control">
            </div>

            {% if ativo.tipo == 'Investimento' %}
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Quantidade</label>
                    <input type="number" step="0.000001" name="quantidade" required class="form-control">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Preco Unit. (R$)</label>
                    <input type="number" step="0.01" name="valor_unitario" required class="form-control">
                </div>
            </div>
            {% else %}
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Valor Total da Venda (R$)</label>
                <input type="number" step="0.01" name="valor_venda" required class="form-control">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">No de Parcelas</label>
                    <input type="number" name="num_parcelas" min="1" value="1" class="form-control">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">1o Vencimento</label>
                    <input type="date" name="data_primeiro_vencimento" class="form-control">
                </div>
            </div>
            {% endif %}
        </div>

        <div
            style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 1rem;">
            <a href="{{ next_url or url_for('ativos.lista') }}" class="btn"
                style="background-color: var(--bg-muted); color: var(--text-muted); padding: 0.75rem 1.5rem; border: 1px solid var(--border-color);">Cancelar</a>
            <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem;">Confirmar Venda</button>
        </div>
    </form>
</div>
{% endblock %}
