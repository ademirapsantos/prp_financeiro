<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha - PRP Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
        }

        .change-card {
            width: 100%;
            max-width: 400px;
            padding: var(--spacing-lg);
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }

        .change-header {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <div class="change-card">
        <div class="change-header">
            <h2>Alterar Senha</h2>
            <p class="text-muted">Por segurança, altere sua senha inicial.</p>
        </div>

        <form method="POST" id="change-password-form">
            <div class="form-group">
                <label for="current_password">Senha Atual (Temporária)</label>
                <input type="password" id="current_password" name="current_password" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="new_password">Nova Senha</label>
                <input type="password" id="new_password" name="new_password" class="form-control" required
                    minlength="6">
                <small class="text-muted" style="display: block; margin-top: 0.25rem; font-size: 0.85rem;">
                    Mínimo 6 caracteres, contendo letras e números.
                </small>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirmar Nova Senha</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">Atualizar Senha</button>
        </form>
    </div>

    <script>
        document.getElementById('change-password-form').onsubmit = function (e) {
            const newPass = document.getElementById('new_password').value;
            const confirmPass = document.getElementById('confirm_password').value;

            if (newPass !== confirmPass) {
                showToast('As senhas não coincidem.', 'error');
                e.preventDefault();
                return false;
            }

            if (newPass.length < 6) {
                showToast('A senha deve ter pelo menos 6 caracteres.', 'error');
                e.preventDefault();
                return false;
            }

            const hasLetter = /[a-zA-Z]/.test(newPass);
            const hasNumber = /[0-9]/.test(newPass);

            if (!hasLetter || !hasNumber) {
                showToast('A senha deve conter letras e números.', 'error');
                e.preventDefault();
                return false;
            }
        };
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }

        {% with messages = get_flashed_messages(with_categories = true) %}
        {% if messages %}
        {% for category, message in messages %}
        showToast("{{ message }}", "{{ 'error' if category == 'error' else 'success' }}");
        {% endfor %}
        {% endif %}
        {% endwith %}
    </script>
</body>

</html>
