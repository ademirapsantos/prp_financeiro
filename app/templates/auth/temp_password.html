<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Temporária - PRP Financeiro</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/logo01.png') }}?v=2">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}?v=2">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='img/logo01.png') }}?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
        }

        .pass-card {
            width: 100%;
            max-width: 450px;
            padding: var(--spacing-lg);
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            text-align: center;
        }

        .temp-pass {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.5rem;
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            color: var(--primary-color);
            letter-spacing: 2px;
            border: 2px dashed var(--accent-color);
        }

        .warning {
            color: var(--danger-color);
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="pass-card">
        <h2 class="text-success">Conta Criada!</h2>
        <p>Anote sua senha temporária para o primeiro login:</p>

        <div class="temp-pass">{{ password }}</div>

        <p class="warning">Você deverá alterar esta senha imediatamente após entrar.</p>

        <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-block">Ir para Login</a>
    </div>
</body>

</html>
