<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - PRP Financeiro</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/logo01.png') }}?v=2">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}?v=2">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='img/logo01.png') }}?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: var(--spacing-lg);
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .login-header h1 {
            color: var(--primary-color);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn-recovery {
            width: 100%;
            padding: 0.75rem;
            margin-top: var(--spacing-sm);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: var(--spacing-md);
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <div class="login-card">
        <div class="login-header">
            <h1>Recuperar Senha</h1>
            <p class="text-muted">Informe seu e-mail cadastrado</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" required autofocus
                    placeholder="seuemail@exemplo.com">
            </div>
            <button type="submit" class="btn btn-primary btn-recovery">Enviar Nova Senha</button>
        </form>

        <a href="{{ url_for('auth.login') }}" class="back-link">← Voltar para o Login</a>
    </div>

    <script>
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }

        {% with messages = get_flashed_messages(with_categories = true) %}
        {% if messages %}
        {% for category, message in messages %}
        showToast("{{ message }}", "{{ 'error' if category == 'error' else 'success' }}");
        {% endfor %}
        {% endif %}
        {% endwith %}
    </script>
</body>

</html>
