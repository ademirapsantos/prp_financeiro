<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PRP Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
            url("{{ url_for('static', filename='img/bg_auth.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: var(--spacing-lg);
            background: rgba(255, 255, 255, 0.15);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .login-header h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .login-header p {
            color: #f1f5f9 !important;
            opacity: 0.9;
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            margin-top: var(--spacing-sm);
        }

        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <div class="login-card">
        <div class="login-header">
            <h1>PRP Financeiro</h1>
            <p class="text-muted">Acesse sua conta</p>
        </div>

        <form id="login-form" method="POST">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" class="form-control" required>
                <div style="text-align: right; margin-top: 0.5rem;">
                    <a href="{{ url_for('auth.forgot_password') }}"
                        style="font-size: 0.85rem; color: var(--accent-color); text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5); text-decoration: none; font-weight: 600;">Esqueci
                        minha
                        senha</a>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login"
                style="background: var(--accent-color); border: none; font-weight: 600;">Entrar</button>
        </form>
    </div>

    <script>
        // Enviar com tecla Enter
        const loginForm = document.getElementById('login-form');
        const inputs = loginForm.querySelectorAll('input');

        inputs.forEach(input => {
            input.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loginForm.submit();
                }
            });
        });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }

        {% with messages = get_flashed_messages(with_categories = true) %}
        {% if messages %}
        {% for category, message in messages %}
        showToast("{{ message }}", "{{ 'error' if category == 'error' else 'success' }}");
        {% endfor %}
        {% endif %}
        {% endwith %}
    </script>
</body>

</html>
