<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção - PRP Financeiro</title>
    <style>
        :root {
            --bg: #f8fafc;
            --text: #1e293b;
            --primary: #2563eb;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #f8fafc;
            --primary: #3b82f6;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            line-height: 1.6;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .loader {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <span class="icon">⚙️</span>
        <h1>Sistema em Atualização</h1>
        <p>Estamos aplicando melhorias e migrações de banco de dados para garantir o melhor desempenho. O sistema
            voltará em instantes.</p>
        <div class="loader"></div>
        <p style="font-size: 0.9rem;">Por favor, não recarregue a página febrilmente.</p>
    </div>
    <script>
        // Check cada 5 segundos se saiu da manutenção
        setInterval(async () => {
            try {
                const res = await fetch('/health');
                if (res.ok) window.location.reload();
            } catch (e) { }
        }, 5000);
    </script>
</body>

</html>
